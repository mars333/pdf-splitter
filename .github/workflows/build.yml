name: Build and Release Windows exe

# 推送形如 v1.2.3 的 tag 时触发,自动构建 exe 并发一个 GitHub Release。
# 手动触发也可以(workflow_dispatch),便于测试。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write  # 需要写权限才能创建 Release 并上传附件

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pypdf pyinstaller

      - name: Build exe with PyInstaller
        run: |
          pyinstaller -F -w --name "pdf-splitter-windows-x64" pdf_split_gui.py

      - name: Show artifact
        run: |
          dir dist
          echo "size (bytes):"
          (Get-Item dist/pdf-splitter-windows-x64.exe).Length

      - name: Upload exe as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-splitter-windows-x64
          path: dist/pdf-splitter-windows-x64.exe

      # 只有在打 tag 时才发 Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/pdf-splitter-windows-x64.exe
          generate_release_notes: true

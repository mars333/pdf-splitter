name: Build and Release (multi-platform)

# 推送 v* tag 会触发,自动在 Windows/macOS/Linux 三个平台各构建一份可执行文件,
# 并把三个产物一起挂到同一个 GitHub Release 上。
# 手动触发只上传 workflow artifact,不发 Release。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false          # 一个平台挂了,其他继续跑完
      matrix:
        include:
          - os: windows-latest
            base_name: pdf-splitter-windows-x64
            output_file: pdf-splitter-windows-x64.exe   # Windows 会自动加 .exe
          - os: macos-latest
            base_name: pdf-splitter-macos-arm64
            output_file: pdf-splitter-macos-arm64
          - os: ubuntu-latest
            base_name: pdf-splitter-linux-x64
            output_file: pdf-splitter-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install tkinter (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller -F -w --name "${{ matrix.base_name }}" pdf_split_gui.py

      - name: Show build output
        shell: bash
        run: ls -la dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.output_file }}
          path: dist/${{ matrix.output_file }}

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/${{ matrix.output_file }}
          generate_release_notes: true
